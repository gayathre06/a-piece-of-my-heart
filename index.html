<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A Piece of My Heart</title>
    <link rel="stylesheet" href="./src/index.css" />
  </head>
  <body>
    <div id="app" class="atmosphere relative min-h-screen flex flex-col items-center justify-center p-6 md:p-12 overflow-hidden">
      <!-- Immersive Background Elements -->
      <div class="absolute inset-0 pointer-events-none">
        <div class="ambient-glow-1"></div>
        <div class="ambient-glow-2"></div>
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_50%,rgba(159,18,57,0.15),transparent_70%)]"></div>
      </div>

      <!-- Floating Hearts Container -->
      <div id="hearts-container" class="fixed inset-0 pointer-events-none z-0"></div>

      <!-- Main Content -->
      <div id="content-anchor" class="z-10 w-full max-w-2xl flex flex-col items-center gap-8 opacity-0 transition-opacity duration-1000">
        <!-- Header -->
        <div class="flex flex-col items-center gap-6">
          <div class="w-px h-12 bg-gradient-to-b from-transparent via-rose-300/30 to-transparent"></div>
          <span class="uppercase tracking-[0.4em] text-[10px] text-rose-300/60 font-semibold">Made Exclusively For You</span>
          <h1 class="font-serif italic text-4xl md:text-5xl text-white drop-shadow-2xl">Hello, Niyaz</h1>
        </div>

        <!-- Initial Interaction Toggle -->
        <div id="interaction-zone" class="w-full flex justify-center">
          <button id="btn-open-heart" class="glass-card px-10 py-5 rounded-full font-serif italic text-lg text-rose-100 shadow-2xl border border-rose-300/10 transition-all cursor-pointer hover:scale-105 hover:bg-white/10">
            Open my heart to you
          </button>
        </div>

        <!-- Hidden Main Card (Initially Hidden) -->
        <div id="main-card-wrapper" class="hidden relative w-full opacity-0 transform translate-y-4 transition-all duration-700">
          <div class="absolute -inset-4 border border-rose-200/5 rounded-[2.5rem] pointer-events-none"></div>
          
          <div class="glass-card p-8 md:p-14 rounded-3xl shadow-2xl relative overflow-hidden flex flex-col items-center min-h-[500px]">
            <!-- Surprise Heart Toggle -->
            <button id="btn-surprise-toggle" class="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-[#1a0b0b] px-4 py-2 border border-rose-200/5 rounded-full z-20 hover:scale-110 transition-transform cursor-pointer">
              <span id="heart-icon-svg"></span>
            </button>

            <!-- Card Content Body -->
            <div id="card-content-area" class="w-full text-center space-y-8 flex-grow flex flex-col justify-center transition-all duration-500">
              <div id="active-content" class="font-serif text-lg md:text-xl leading-relaxed text-rose-100/90 drop-shadow-md">
                <!-- Content injected via JS -->
              </div>

              <!-- Navigation and Status -->
              <div class="pt-8 flex flex-col items-center gap-6">
                <div id="current-section-label" class="text-[10px] uppercase tracking-[0.3em] text-rose-400/50 font-medium font-sans">
                  Your space. Your thoughts.
                </div>
                
                <div id="nav-buttons" class="flex flex-wrap justify-center gap-3 md:gap-4 mt-2">
                  <!-- Nav buttons injected via JS -->
                </div>
              </div>
            </div>

            <!-- Surprise Layout (Initially Hidden) -->
            <div id="surprise-area" class="hidden w-full flex flex-col items-center justify-center h-full text-center space-y-6 opacity-0 transition-opacity duration-500">
              <div id="sparkles-icon"></div>
              <p class="font-serif italic text-3xl text-rose-100">Surprise!</p>
              <p class="text-rose-100/90 text-sm italic font-serif leading-relaxed max-w-xs">
                "I'm thinking of you at this very second. Infinite hugs, sent wirelessly through the ether, just for you."
              </p>
              <button id="btn-close-surprise" class="text-[9px] uppercase tracking-widest text-rose-400 hover:text-rose-200 transition-colors cursor-pointer">
                Return to the sections
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Footer Info -->
      <div class="absolute bottom-12 left-12 hidden md:flex items-center gap-4 opacity-40">
        <div class="w-1.5 h-1.5 rounded-full bg-rose-400 shadow-[0_0_8px_rgba(251,113,133,0.6)]"></div>
        <span class="text-[10px] tracking-[0.2em] uppercase font-sans font-semibold text-rose-100">Connected Across Timezones</span>
      </div>
      
      <div class="absolute top-12 right-12 hidden md:block opacity-30">
        <span class="text-[10px] tracking-[0.2em] uppercase font-sans font-semibold text-rose-100">Distance: 0 Miles Inside This Screen</span>
      </div>

      <footer class="absolute bottom-8 md:hidden text-[9px] uppercase tracking-[0.2em] opacity-30 text-rose-100">
        Bridging the distance
      </footer>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
